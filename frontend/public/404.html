<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Supplier Portal</title>
  <!--
    GitHub Pages SPA fallback for a PROJECT PAGE (not a root custom domain).

    When GitHub Pages serves a 404 (e.g. user visits
    rsmd365.com/supplier-collaboration/rfq/abc123 directly), this page:
      1. Saves the full original URL in sessionStorage.redirect
      2. Redirects to rsmd365.com/supplier-collaboration/?/rfq/abc123
         so GitHub Pages returns the correct index.html.

    index.html's inline script then restores the original URL via
    history.replaceState, and React Router renders the right route.

    pathSegmentsToKeep = 1  (keep the "/supplier-collaboration" segment)

    Based on: https://github.com/rafgraph/spa-github-pages
  -->
  <script>
    var segmentsToKeep = 1;
    var l = window.location;
    sessionStorage.redirect = l.href;
    l.replace(
      l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
      l.pathname.split('/').slice(0, 1 + segmentsToKeep).join('/') + '/?/' +
      l.pathname.slice(1).split('/').slice(segmentsToKeep).join('/').replace(/&/g, '~and~') +
      (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
      l.hash
    );
  </script>
</head>
<body></body>
</html>
