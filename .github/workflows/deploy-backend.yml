name: Deploy Backend → Azure App Service

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      # Install all deps (devDeps needed for TypeScript compile)
      - name: Install dependencies
        working-directory: backend
        run: npm ci

      # Compile TypeScript → dist/
      - name: Build
        working-directory: backend
        run: npm run build

      # Prune devDependencies before packaging
      - name: Install production dependencies only
        working-directory: backend
        run: npm ci --omit=dev

      # Deploy to Azure App Service.
      #
      # Required GitHub Secrets (Repo → Settings → Secrets and variables → Actions → Secrets):
      #   AZURE_WEBAPP_NAME            e.g. supplier-portal-api
      #   AZURE_WEBAPP_PUBLISH_PROFILE paste the XML from Azure portal:
      #                                App Service → Overview → Get publish profile
      #
      # ALL runtime env vars (D365 creds, SMTP, etc.) must be set directly in
      # Azure Portal → App Service → Configuration → App Settings.
      # Set FRONTEND_URL=https://rsmd365.com/supplier-collaboration there.
      # D365 credentials MUST NOT be stored in GitHub at any time.
      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: backend
