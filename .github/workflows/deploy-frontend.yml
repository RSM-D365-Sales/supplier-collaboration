name: Deploy Frontend → GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - '.github/workflows/deploy-frontend.yml'
  workflow_dispatch:

# Required for the GitHub Pages deployment API
permissions:
  contents: read
  pages: write
  id-token: write

# Only one Pages deployment runs at a time
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  # ── 1. Build ───────────────────────────────────────────────────────────────
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build
        working-directory: frontend
        env:
          # Set this as a GitHub Actions Variable (not a secret):
          # Repo → Settings → Secrets and variables → Actions → Variables
          # Name: VITE_API_URL   Value: https://portal-api.rsmd365.com
          VITE_API_URL: ${{ vars.VITE_API_URL }}
        run: npm run build
        # Vite reads `base` from vite.config.ts (command='build' → '/supplier-collaboration/')
        # so all asset paths in the output are automatically prefixed.

      - uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

  # ── 2. Deploy ──────────────────────────────────────────────────────────────
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
